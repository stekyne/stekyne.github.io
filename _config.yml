title: Stephen Kyne's blog
description: >-
  Stephen Kyne's personal blog on software development,
  technology, and engineering.
baseurl: ""
url: "https://stekyne.github.io"

author: Stephen Kyne
github_username: stekyne

theme: minima
markdown: kramdown
permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

header_pages: []

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - CLAUDE.md
  - .claude/
  - .agents/
  - skills-lock.json
